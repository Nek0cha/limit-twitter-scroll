<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="manifest.open_in_tab" content="true" />
    <title>Twitter無限スクロール防止拡張機能 - 設定</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Twitter無限スクロール防止拡張機能 - 設定</h1>

      <div class="field">
        <label for="baseThreshold">初期閾値（スクロールpx）</label>
        <input type="number" id="baseThreshold" min="100" step="100" />
        <p class="hint">ゲージが満タンになるまでのスクロール量です。数値が小さいほど早く確認が挟まれます。</p>
      </div>

      <div class="field">
        <label for="incrementRate">閾値の減少率（%）</label>
        <input type="number" id="incrementRate" min="0" max="90" step="5" />
        <p class="hint">「続ける」を選ぶたびに、次の閾値がこの割合だけ減少します（スクロールがだんだん重くなります）。</p>
      </div>

      <div class="field field-checkbox">
        <label>
          <input type="checkbox" id="blurOnStop" />
          「休憩する」を選んだ時にタイムラインをぼかしてロックする
        </label>
      </div>

      <button type="button" id="save">保存</button>
      <p id="status" class="status" role="status"></p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
